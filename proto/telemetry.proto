syntax = "proto3";

package telemetry;

option go_package = "./proto;telemetry";

// Сервис для получения данных о телеметрии
service TelemetryService {
  // Получить текущее состояние устройства (из Redis)
  rpc GetDeviceState (DeviceRequest) returns (DeviceStateResponse);

  // Получить историю метрик устройства (из Postgres)
  rpc GetDeviceHistory (DeviceRequest) returns (DeviceHistoryResponse);
}

message DeviceRequest {
  string device_id = 1;
}

message DeviceStateResponse {
  string device_id = 1;
  int32 cpu_usage = 2;
  int32 memory_usage = 3;
  string status = 4;
  string timestamp = 5;
}

message DeviceHistoryResponse {
  string device_id = 1;
  repeated DeviceStateResponse history = 2;
}